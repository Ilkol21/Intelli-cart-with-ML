version: '3.8'

services:
  # --- ТОЧКИ ВХОДУ ---
  frontend-react:
    build:
      context: ./frontend-react
    container_name: frontend-react
    ports:
      - "8080:80"
    restart: unless-stopped
    depends_on:
      - api-gateway

  admin-vue:
    build:
      context: ./admin-vue
    container_name: admin-vue
    ports:
      - "8081:80"
    restart: unless-stopped
    depends_on:
      - api-gateway

  # --- ШЛЮЗ ---
  api-gateway:
    build:
      context: ./api-gateway
    container_name: api-gateway
    restart: unless-stopped
    env_file:
      - ./api-gateway/.env
    depends_on:
      user-service-web:
        condition: service_started
      delivery-service:
        condition: service_healthy
      product-catalog-service:
        condition: service_healthy

  # --- СЕРВІСИ БЕКЕНДУ ---
  user-service-web:
    image: nginx:alpine
    container_name: user-service-web
    volumes:
      - ./user-service:/var/www/html
      - ./user-service/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - user-service

  user-service:
    build:
      context: ./user-service
    container_name: user-service
    command: sh -c "php artisan migrate --force && php artisan db:seed --force && php-fpm"
    restart: unless-stopped
    depends_on:
      postgres-db:
        condition: service_healthy

  delivery-service:
    build:
      context: ./delivery-service
    container_name: delivery-service
    restart: unless-stopped
    env_file:
      - ./delivery-service/.env
    depends_on:
      postgres-db:
        condition: service_healthy
      kafka:
        condition: service_started
    healthcheck:
      # --- ВИПРАВЛЕНО: Додано Healthcheck ---
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:3000/deliveries/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  product-catalog-service:
    build:
      context: ./product-catalog-service
    container_name: product-catalog-service
    restart: unless-stopped
    env_file:
      - ./product-catalog-service/.env
    volumes:
      - uploads_data:/usr/src/app/uploads
    depends_on:
      postgres-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:3000/products/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- "РОЗУМНІ" СЕРВІСИ ---
  recommendation-service:
    build:
      context: ./recommendation-service
    container_name: recommendation-service
    restart: unless-stopped
    environment:
      KAFKA_BROKER: kafka:29092
      REDIS_HOST: redis
      RABBITMQ_HOST: rabbitmq
    depends_on:
      kafka:
        condition: service_started
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started
      product-catalog-service:
        condition: service_healthy

  # --- ІНФРАСТРУКТУРА ---
  postgres-db:
    image: postgres:14-alpine
    container_name: postgres-db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    healthcheck:
      # --- ВИПРАВЛЕНО: Більш надійна перевірка ---
      test: ["CMD-SHELL", "pg_isready -U user -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.0.1
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.0.1
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 'zookeeper:2181'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_CREATE_TOPICS: "shopping_events:1:1,delivery_ordered:1:1"

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq
    ports:
      - "5673:5672"
      - "15673:15672"

  redis:
    image: redis:alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres-data:
  redis_data:
  uploads_data: